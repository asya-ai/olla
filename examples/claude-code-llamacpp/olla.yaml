# Olla Configuration for Claude Code + llama.cpp Integration

server:
  host: 0.0.0.0
  port: 40114
  rate_limits:
    global_requests_per_minute: 600
    per_ip_requests_per_minute: 100
    health_requests_per_minute: 1000
    burst_size: 50
    cleanup_interval: 5m

proxy:
  engine: olla              # High-performance engine (default)
  load_balancer: priority
  stream_buffer_size: 8192
  response_timeout: 300s
  read_timeout: 60s

# Enable Anthropic Messages API translation
# llama.cpp has native Anthropic support (b4847+), so eligible requests
# use passthrough for zero translation overhead.
translators:
  anthropic:
    enabled: true
    passthrough_enabled: true       # Native Anthropic support in llama.cpp
    max_message_size: 10485760      # 10MB max request size

# llama.cpp backend discovery
discovery:
  type: static
  static:
    endpoints:
      - url: "http://llama-cpp:8080"
        name: "local-llamacpp"
        type: "llamacpp"
        priority: 100
        model_url: "/v1/models"      # OpenAI-compatible endpoint
        health_check_url: "/health"  # llama.cpp health endpoint
        check_interval: 2s
        check_timeout: 1s

model_registry:
  type: memory
  enable_unifier: true

logging:
  level: "info"
  format: "json"
  output: "stdout"
