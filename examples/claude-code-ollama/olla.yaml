# Olla Configuration for Claude Code + Ollama Integration
# This configuration enables Anthropic Messages API translation
# for use with Claude Code, OpenCode, and Crush CLI.

server:
  host: 0.0.0.0
  port: 40114
  rate_limits:
    global_requests_per_minute: 600
    per_ip_requests_per_minute: 100
    health_requests_per_minute: 1000
    burst_size: 50
    cleanup_interval: 5m

# Proxy configuration
proxy:
  engine: olla             # High-performance engine (default)
  load_balancer: priority  # Route to highest-priority endpoint first
  stream_buffer_size: 8192
  response_timeout: 300s   # 5 minutes for long generations
  read_timeout: 60s

# Enable Anthropic Messages API translation
translators:
  anthropic:
    enabled: true                   # Enable Anthropic API translator
    passthrough_enabled: true       # Zero-overhead passthrough for Ollama (native Anthropic support)
    max_message_size: 10485760      # 10MB max request size

# Backend discovery
discovery:
  type: static
  static:
    endpoints:
      - url: "http://ollama:11434"
        name: "local-ollama"
        type: "ollama"
        priority: 100               # Highest priority
        model_url: "/api/tags"
        health_check_url: "/"
        check_interval: 2s
        check_timeout: 1s

# Model registry configuration
model_registry:
  type: memory
  enable_unifier: true
  routing_strategy:
    type: "optimistic"              # Allow fallback to compatible models
    options:
      fallback_behavior: "compatible_only"

# Logging configuration
logging:
  level: "info"
  format: "json"
  output: "stdout"
