services:
  # Olla proxy/load balancer - connects to external Ollama instances
  olla:
    image: ghcr.io/thushan/olla:latest
    container_name: olla
    restart: unless-stopped
    ports:
      - "40114:40114"
    volumes:
      # Override the default config with our custom configuration
      - ./olla.yaml:/app/config.yaml:ro
      - ./.container/olla/logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:40114/internal/health"]
      timeout: 5s
      interval: 30s
      retries: 3
      start_period: 10s

  # Open WebUI - the web interface
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: unless-stopped
    ports:
      - "3000:8080"
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      # Point Open WebUI at Olla using the Ollama-compatible endpoint.
      # Open WebUI appends /api/* paths itself; provide only the base URL.
      - OLLAMA_BASE_URL=http://olla:40114/olla/ollama
      # Optional: also expose Olla as an OpenAI-compatible connection.
      # Open WebUI expects the full /v1 path for OpenAI-style endpoints.
      # - OPENAI_API_BASE_URL=http://olla:40114/olla/proxy/v1
      # - OPENAI_API_KEY=olla
      # Optional: customise the Web UI
      - WEBUI_NAME=Olla + Open WebUI
      - WEBUI_URL=http://localhost:3000
      - WEBUI_SECRET_KEY=change-this-secret-key
    depends_on:
      olla:
        condition: service_healthy

volumes:
  openwebui_data:
    driver: local

networks:
  default:
    name: olla-network
